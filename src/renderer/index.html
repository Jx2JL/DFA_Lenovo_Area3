<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackPoint Notify</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI Variable", "Segoe UI", -apple-system,
        BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .toast {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      padding: 0;
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 8px;
      color: #1a1a1a;
      pointer-events: none;
      overflow: hidden;

      /* slide up from below */
      opacity: 0;
      transform: translateY(20px);
      transition:
        opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);

      box-shadow:
        0 2px 6px rgba(0, 0, 0, 0.06),
        0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Header row: icon + app name ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px 0 16px;
    }

    .app-icon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      background: linear-gradient(135deg, #e84040, #c0302f);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .app-icon svg {
      width: 8px;
      height: 8px;
      fill: #fff;
    }

    .app-name {
      font-size: 11px;
      font-weight: 400;
      color: #5f6368;
      letter-spacing: 0.01em;
    }

    /* ── Body: instruction + detail ── */
    .body {
      padding: 8px 16px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .instruction {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.4;
    }

    .detail {
      font-size: 12px;
      font-weight: 400;
      color: #5f6368;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="header">
      <div class="app-icon">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="4" />
        </svg>
      </div>
      <span class="app-name">TrackPoint</span>
    </div>
    <div class="body">
      <div class="instruction" id="instruction"></div>
      <div class="detail" id="detail"></div>
    </div>
  </div>

  <script>
    const toast = document.getElementById("toast");
    const instructionEl = document.getElementById("instruction");
    const detailEl = document.getElementById("detail");

    window.coach.onShowTip((message) => {
      // Split on newline: first line is the instruction, rest is detail
      const parts = message.split("\n");
      instructionEl.textContent = parts[0] || "";
      detailEl.textContent = parts.slice(1).join(" ") || "";
      toast.classList.add("visible");
    });

    window.coach.onHideTip(() => {
      toast.classList.remove("visible");
    });
  </script>
</body>
</html>
